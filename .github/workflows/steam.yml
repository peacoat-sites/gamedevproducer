name: Steam top games data
on:
  schedule:
    - cron: '23 8 * * 1'
  workflow_dispatch: {}
permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PIPELINE_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python pipeline/fetch_steam.py
      - run: |
          git config user.name "data-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/steam.json
          git diff --cached --quiet || git commit -m "data: refresh steam top games"
          git push
