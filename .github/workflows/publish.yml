name: Publish Articles

on:
  schedule:
    - cron: '17 9 * * *'
  workflow_dispatch:
    inputs:
      count:
        description: 'Articles to publish'
        required: false
        default: '2'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PIPELINE_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install anthropic requests PyNaCl

      - name: Publish articles
        run: python pipeline/publish.py --site ${{ vars.SITE_NAME }} --count ${{ github.event.inputs.count || '2' }}
        env:
          ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
          GSC_INDEXING_TOKEN:       ${{ secrets.GSC_INDEXING_TOKEN }}
          GOOGLE_CLIENT_ID:         ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:     ${{ secrets.GOOGLE_CLIENT_SECRET }}
          PIPELINE_TOKEN:           ${{ secrets.PIPELINE_TOKEN }}
          GITHUB_TOKEN:             ${{ secrets.PIPELINE_TOKEN }}
          PORTFOLIO_ORG:            peacoat-sites
          GITHUB_ORG:               peacoat-sites
          PEXELS_API_KEY:           ${{ secrets.PEXELS_API_KEY }}
          FLUX_API_KEY:             ${{ secrets.FLUX_API_KEY }}
          ANTHROPIC_MONTHLY_BUDGET: ${{ secrets.ANTHROPIC_MONTHLY_BUDGET }}
          SITES_CONFIG:             ${{ secrets.SITES_CONFIG }}
          AMAZON_TRACKING_ID:       ${{ secrets.AMAZON_TRACKING_ID }}
