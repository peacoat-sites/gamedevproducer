<div style="margin:30px 0;border:1px solid var(--border);border-radius:14px;overflow:hidden;font-variant-numeric:tabular-nums">
  <div style="padding:15px 20px;background:var(--surface2);font-weight:800;font-size:1.1rem">Game Revenue Share &amp; Royalty Calculator</div>
  <div style="padding:20px">

    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:14px">
      <label style="display:flex;flex-direction:column;gap:6px;font-size:13px;font-weight:600;color:var(--muted)">
        Total Gross Revenue ($)
        <input id="roy-gross" type="number" value="500000" min="0" step="1000"
          style="width:100%;padding:12px 13px;border:1.5px solid var(--border-strong);border-radius:10px;font-size:16px;color:var(--text);background:var(--surface);box-sizing:border-box;font-family:inherit;transition:border-color .15s,box-shadow .15s"
          onfocus="this.style.borderColor='var(--accent)';this.style.boxShadow='0 0 0 3px color-mix(in srgb,var(--accent) 20%,transparent)'"
          onblur="this.style.borderColor='';this.style.boxShadow=''" oninput="royCalc()">
      </label>

      <label style="display:flex;flex-direction:column;gap:6px;font-size:13px;font-weight:600;color:var(--muted)">
        Platform Fee (%)
        <select id="roy-platform" oninput="royCalc()"
          style="width:100%;padding:12px 13px;border:1.5px solid var(--border-strong);border-radius:10px;font-size:16px;color:var(--text);background:var(--surface);box-sizing:border-box;font-family:inherit">
          <option value="30" selected>Steam — 30%</option>
          <option value="12">Epic Games Store — 12%</option>
          <option value="10">itch.io — 10%</option>
          <option value="30">Console (PlayStation/Xbox/Switch) — 30%</option>
          <option value="15">Apple App Store — 15%</option>
          <option value="15">Google Play — 15%</option>
          <option value="0">Custom…</option>
        </select>
      </label>

      <label style="display:flex;flex-direction:column;gap:6px;font-size:13px;font-weight:600;color:var(--muted)">
        Custom Platform Fee (%)
        <input id="roy-platform-custom" type="number" value="30" min="0" max="100" step="1"
          style="width:100%;padding:12px 13px;border:1.5px solid var(--border-strong);border-radius:10px;font-size:16px;color:var(--text);background:var(--surface);box-sizing:border-box;font-family:inherit;transition:border-color .15s,box-shadow .15s"
          onfocus="this.style.borderColor='var(--accent)';this.style.boxShadow='0 0 0 3px color-mix(in srgb,var(--accent) 20%,transparent)'"
          onblur="this.style.borderColor='';this.style.boxShadow=''" oninput="royCalc()">
      </label>

      <label style="display:flex;flex-direction:column;gap:6px;font-size:13px;font-weight:600;color:var(--muted)">
        Publisher / Investor Share (%)
        <input id="roy-pub" type="number" value="0" min="0" max="100" step="1"
          style="width:100%;padding:12px 13px;border:1.5px solid var(--border-strong);border-radius:10px;font-size:16px;color:var(--text);background:var(--surface);box-sizing:border-box;font-family:inherit;transition:border-color .15s,box-shadow .15s"
          onfocus="this.style.borderColor='var(--accent)';this.style.boxShadow='0 0 0 3px color-mix(in srgb,var(--accent) 20%,transparent)'"
          onblur="this.style.borderColor='';this.style.boxShadow=''" oninput="royCalc()">
      </label>

      <label style="display:flex;flex-direction:column;gap:6px;font-size:13px;font-weight:600;color:var(--muted)">
        Recoupment Threshold ($)
        <input id="roy-recoup" type="number" value="0" min="0" step="1000"
          style="width:100%;padding:12px 13px;border:1.5px solid var(--border-strong);border-radius:10px;font-size:16px;color:var(--text);background:var(--surface);box-sizing:border-box;font-family:inherit;transition:border-color .15s,box-shadow .15s"
          onfocus="this.style.borderColor='var(--accent)';this.style.boxShadow='0 0 0 3px color-mix(in srgb,var(--accent) 20%,transparent)'"
          onblur="this.style.borderColor='';this.style.boxShadow=''" oninput="royCalc()">
      </label>
    </div>

    <!-- Team members -->
    <div style="margin-top:20px">
      <div style="font-weight:700;font-size:.95rem;margin-bottom:10px">Team Members</div>
      <div id="roy-team" style="display:flex;flex-direction:column;gap:10px"></div>
      <button onclick="royAddMember()" style="margin-top:10px;padding:8px 16px;border:1.5px solid var(--accent);border-radius:8px;background:transparent;color:var(--accent);font-weight:600;cursor:pointer;font-size:.9rem">+ Add Member</button>
    </div>

    <!-- Results -->
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-top:20px">
      <div style="background:var(--surface2);border-radius:12px;padding:14px 16px;text-align:center">
        <span style="display:block;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)">After Platform Fee</span>
        <span id="roy-after-platform" style="display:block;font-size:1.5rem;font-weight:800;color:var(--accent);line-height:1.15;margin:2px 0">—</span>
      </div>
      <div style="background:var(--surface2);border-radius:12px;padding:14px 16px;text-align:center">
        <span style="display:block;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)">After Recoupment</span>
        <span id="roy-after-recoup" style="display:block;font-size:1.5rem;font-weight:800;color:var(--accent);line-height:1.15;margin:2px 0">—</span>
      </div>
      <div style="background:var(--surface2);border-radius:12px;padding:14px 16px;text-align:center">
        <span style="display:block;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)">After Publisher</span>
        <span id="roy-after-pub" style="display:block;font-size:1.5rem;font-weight:800;color:var(--accent);line-height:1.15;margin:2px 0">—</span>
      </div>
    </div>

    <div id="roy-splits" style="margin-top:16px;display:none">
      <div style="font-weight:700;font-size:.95rem;margin-bottom:8px">Team Payouts</div>
      <div id="roy-splits-table"></div>
    </div>

    <p style="margin:16px 0 0;font-size:12px;color:var(--stone)">Revenue share agreements should be documented in a legal contract. Consider consulting an entertainment lawyer for complex deals.</p>
  </div>
</div>

<script>
(function(){
  var members=[{name:'Developer 1',pct:50},{name:'Developer 2',pct:50}];
  function fmt(n){
    if(n>=1e6) return '$'+(n/1e6).toFixed(2)+'M';
    if(n>=1e3) return '$'+(n/1e3).toFixed(1)+'k';
    return '$'+n.toFixed(0);
  }
  function renderTeam(){
    var d=document.getElementById('roy-team');
    d.innerHTML='';
    members.forEach(function(m,i){
      var row=document.createElement('div');
      row.style.cssText='display:grid;grid-template-columns:1fr auto auto;gap:10px;align-items:center';
      row.innerHTML='<input placeholder="Name" value="'+m.name+'" oninput="royUpdateMember('+i+',\'name\',this.value)" style="padding:10px 12px;border:1.5px solid var(--border-strong);border-radius:8px;font-size:15px;color:var(--text);background:var(--surface);font-family:inherit;box-sizing:border-box">'
        +'<div style="display:flex;align-items:center;gap:6px"><input type="number" value="'+m.pct+'" min="0" max="100" step="1" oninput="royUpdateMember('+i+',\'pct\',this.value)" style="width:80px;padding:10px 12px;border:1.5px solid var(--border-strong);border-radius:8px;font-size:15px;color:var(--text);background:var(--surface);font-family:inherit;box-sizing:border-box"><span style="font-weight:700;color:var(--muted)">%</span></div>'
        +(members.length>1?'<button onclick="royRemoveMember('+i+')" style="padding:8px 12px;border:1px solid var(--border-strong);border-radius:8px;background:var(--surface);color:var(--muted);cursor:pointer;font-size:.85rem">✕</button>':'<div></div>');
      d.appendChild(row);
    });
  }
  window.royUpdateMember=function(i,k,v){members[i][k]=k==='pct'?parseFloat(v)||0:v;royCalc();};
  window.royAddMember=function(){if(members.length<5){members.push({name:'Member '+(members.length+1),pct:0});renderTeam();royCalc();}};
  window.royRemoveMember=function(i){members.splice(i,1);renderTeam();royCalc();};
  window.royCalc=function(){
    var gross=parseFloat(document.getElementById('roy-gross').value)||0;
    var platformSel=document.getElementById('roy-platform').value;
    var platformPct=platformSel==='0'?parseFloat(document.getElementById('roy-platform-custom').value)||0:parseFloat(platformSel);
    var pub=parseFloat(document.getElementById('roy-pub').value)||0;
    var recoup=parseFloat(document.getElementById('roy-recoup').value)||0;
    var afterPlatform=gross*(1-platformPct/100);
    var afterRecoup=Math.max(0,afterPlatform-recoup);
    var afterPub=afterRecoup*(1-pub/100);
    document.getElementById('roy-after-platform').textContent=fmt(afterPlatform);
    document.getElementById('roy-after-recoup').textContent=fmt(afterRecoup);
    document.getElementById('roy-after-pub').textContent=fmt(afterPub);
    var totalPct=members.reduce(function(s,m){return s+m.pct;},0);
    if(totalPct>0){
      var tbl=document.getElementById('roy-splits-table');
      var html='<table style="width:100%;border-collapse:collapse;font-size:.9rem"><thead><tr style="background:var(--surface2)"><th style="padding:8px 12px;text-align:left;border:1px solid var(--border)">Member</th><th style="padding:8px 12px;text-align:right;border:1px solid var(--border)">Share</th><th style="padding:8px 12px;text-align:right;border:1px solid var(--border)">Amount</th></tr></thead><tbody>';
      members.forEach(function(m,i){
        var amt=afterPub*(m.pct/100);
        html+='<tr'+(i%2?'':' style="background:var(--surface2)"')+'><td style="padding:8px 12px;border:1px solid var(--border)">'+m.name+'</td><td style="padding:8px 12px;border:1px solid var(--border);text-align:right">'+m.pct+'%</td><td style="padding:8px 12px;border:1px solid var(--border);text-align:right;font-weight:700">'+fmt(amt)+'</td></tr>';
      });
      html+='</tbody></table>';
      tbl.innerHTML=html;
      document.getElementById('roy-splits').style.display='block';
    }
  };
  renderTeam();
  royCalc();
})();
</script>
