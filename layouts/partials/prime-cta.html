{{ $p := site.Data.promos.prime_young_adults }}
{{ if and $p $p.url (lt now (time "2026-10-10")) }}
<div class="prime-cta-strip" style="display:flex;align-items:center;gap:16px;background:linear-gradient(135deg,#1e1b4b 0%,#312e81 100%);border-radius:10px;padding:16px 20px;margin:2rem 0;flex-wrap:wrap">
  <div style="font-size:2rem;flex-shrink:0">🎮</div>
  <div style="flex:1;min-width:220px">
    <div style="font-weight:700;color:#fff;font-size:.95rem;margin-bottom:4px">{{ $p.label }}</div>
    <div style="color:#c7d2fe;font-size:.83rem;line-height:1.4">{{ $p.blurb }}</div>
  </div>
  <a href="{{ $p.url }}" rel="sponsored noopener" target="_blank"
     style="display:inline-block;background:#c084fc;color:#1e1b4b;font-weight:700;font-size:.85rem;padding:10px 18px;border-radius:8px;text-decoration:none;white-space:nowrap;flex-shrink:0">
    {{ $p.cta }}
  </a>
</div>
{{ end }}
