<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }} — {{ .Site.Params.tagline }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="canonical" href="{{ .Permalink }}">
  {{- if or (eq .Kind "taxonomy") (eq .Kind "term") }}
  <meta name="robots" content="noindex,follow">{{- end }}
  <meta property="og:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }}{{ end }}">
  <meta property="og:description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
  {{ if .IsPage }}<meta property="article:published_time" content="{{ .PublishDate.Format "2006-01-02T15:04:05Z07:00" }}">{{ end }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="sitemap" type="application/xml" href="/sitemap.xml">
  <style>
    :root {
      --hero-c1: {{ .Site.Params.hero_color_1 | default "#0f0c29" }};
      --hero-c2: {{ .Site.Params.hero_color_2 | default "#302b63" }};
      --hero-c3: {{ .Site.Params.hero_color_3 | default "#24243e" }};
      --hero-c4: {{ .Site.Params.hero_color_4 | default "#1a1a2e" }};
    }
  </style>
  <!-- AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client={{ .Site.Params.adsense_id }}" crossorigin="anonymous"></script>
  <!-- Schema.org -->
  {{ partial "schema.html" . }}
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a class="nav-logo" href="/">Game<span>Dev</span>Producer</a>
    <ul class="nav-links">
      <li><a href="/categories/best-practices/">Best Practices</a></li>
      <li><a href="/categories/tools/">Tools</a></li>
      <li><a href="/categories/career/">Career</a></li>
      <li><a href="/industry-news/">Industry News</a></li>
      <li><a href="/about/">About</a></li>
      <li><a href="#newsletter" class="nav-cta">Newsletter</a></li>
    </ul>
  </div>
</nav>

{{ block "main" . }}{{ end }}

{{ partial "footer.html" . }}

</body>
</html>
